{% load static %}

<header>
  <nav style="background-color: rgb(220, 241, 254); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;"></nav>
    <img src="{% static 'Icon.png' %}" alt="Логотип магазина" style="height: 40px;">

    {% if user.is_authenticated %}
      <div style="display: flex; align-items: center;">
        <span style="margin-right: 10px; font-weight: bold;">Привет, {{ user.get_full_name|default:user.username }}!</span>
        <form method="post" action="{% url 'logout' %}" style="margin: 0;">
          {% csrf_token %}
          <button type="submit">Выход</button>
        </form>
      </div>
    {% elif request.resolver_match.url_name != 'login' %}
      <a href="{% url 'login' %}" style="padding: 5px 10px; background-color: #31EBFF; color: black; text-decoration: none; border-radius: 4px;">Войти</a>
    {% endif %}

  </nav>
</header>
