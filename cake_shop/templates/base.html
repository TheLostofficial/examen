{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{% stafic 'Icon.ico' %}">
  <style>
    body { font-family: 'Times New Roman', serif; background: #FFFFFF; margin: 20px; }
    button, input[type="submit"],
    a[style*="background-color"] { background-color: #31EBFF; color: black; border: none; border-radius: 4px; padding: 5px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #000; padding: 8px; }
    th { background: #FC34C8; }
    .product-row { background: #FC34C8; }
    .high-discount { background: #31EBFF; }
    .out-of-stock { background: lightblue; }
    .price-discount s { color: red; }
    .price-discount .final-price { color: black; }
    .product-image { max-width: 100px; }
  </style>
</head>
<body>
  {% include 'include/header.html'%}
    <main>
      {% block content%}{% endblock %}
    </main>
  {% include 'include/footer.html'%}
  
</body>
</html>
